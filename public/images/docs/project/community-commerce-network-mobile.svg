<svg xmlns="http://www.w3.org/2000/svg" width="360" height="780" viewBox="0 0 360 780" role="img" aria-labelledby="title desc">
  <title id="title">Community commerce network</title>
  <desc id="desc">Channels lead into a community or operator discovery projection, then to separate seller stores. A selected offer hands off to one seller-owned transaction.</desc>
  <rect width="360" height="780" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="778" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="22" y="34" fill="#004eeb" font-size="10" font-weight="700" letter-spacing="1.3">DISTRIBUTED DISCOVERY</text>
    <text x="22" y="62" fill="#1b2a4e" font-size="21" font-weight="750">Many market entrances</text>
    <text x="22" y="84" fill="#64748b" font-size="11">Discovery connects stores without owning them.</text>
    <text x="22" y="117" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1.1">ENTRY CHANNELS</text>
    <g fill="#ffffff" stroke="#b9c9dc">
      <rect x="22" y="130" width="150" height="42" rx="8"/><rect x="188" y="130" width="150" height="42" rx="8"/>
      <rect x="22" y="184" width="150" height="42" rx="8"/><rect x="188" y="184" width="150" height="42" rx="8"/>
    </g>
    <g fill="#1b2a4e" font-size="11" font-weight="700" text-anchor="middle">
      <text x="97" y="155">Community</text><text x="263" y="155">Web / domain</text><text x="97" y="209">Direct / Deal link</text><text x="263" y="209">Agent / integration</text>
    </g>
    <path d="M180 226v22" stroke="#9bb8e8" stroke-width="1.5"/>
    <rect x="22" y="248" width="316" height="148" rx="12" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.4"/>
    <text x="39" y="272" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">MARKET · DISCOVERY PROJECTION</text>
    <g fill="#ffffff" stroke="#c4d6f5">
      <rect x="39" y="288" width="282" height="28" rx="7"/><rect x="39" y="324" width="282" height="28" rx="7"/><rect x="39" y="360" width="282" height="28" rx="7"/>
    </g>
    <g fill="#1b2a4e" font-size="10" font-weight="700" text-anchor="middle">
      <text x="180" y="306">Market identity · brand · domain</text><text x="180" y="342">Consent · review · visibility</text><text x="180" y="378">Curation · buyer access · discoverability</text>
    </g>
    <path d="M180 396v24" stroke="#7ea7ef" stroke-width="1.6"/>
    <text x="22" y="441" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1.1">INDEPENDENT SELLER AUTHORITIES</text>
    <g fill="#ffffff" stroke="#7ea7ef">
      <rect x="22" y="454" width="316" height="58" rx="9"/><rect x="22" y="524" width="316" height="58" rx="9"/><rect x="22" y="594" width="316" height="58" rx="9"/>
    </g>
    <g fill="#1b2a4e" font-size="12" font-weight="700">
      <text x="39" y="478">Seller store A</text><text x="39" y="548">Seller store B</text><text x="39" y="618">Seller store C</text>
    </g>
    <g fill="#64748b" font-size="10">
      <text x="39" y="497">live terms · order · payment · fulfillment</text><text x="39" y="567">live terms · order · payment · fulfillment</text><text x="39" y="637">live terms · order · payment · fulfillment</text>
    </g>
    <rect x="22" y="682" width="316" height="60" rx="9" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="180" y="707" text-anchor="middle" fill="#6d4b0c" font-size="10" font-weight="700">Selected offer → one seller context</text>
    <text x="180" y="725" text-anchor="middle" fill="#6d4b0c" font-size="10" font-weight="700">→ one quote, order, and transaction spine</text>
  </g>
