<svg xmlns="http://www.w3.org/2000/svg" width="360" height="780" viewBox="0 0 360 780" role="img" aria-labelledby="title desc">
  <title id="title">Agent commerce execution boundary</title>
  <desc id="desc">A vertical flow from user goal through persona and scope, Skill, Tool discovery, request-bound approval, Core validation, and audited result.</desc>
  <rect width="360" height="780" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="778" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="22" y="34" fill="#004eeb" font-size="10" font-weight="700" letter-spacing="1.3">BOUNDED AGENT COMMERCE</text>
    <text x="22" y="62" fill="#1b2a4e" font-size="20" font-weight="750">Reasoning proposes</text>
    <text x="22" y="86" fill="#1b2a4e" font-size="20" font-weight="750">typed authority executes</text>
    <text x="22" y="108" fill="#64748b" font-size="11">Models and Skills do not own commerce state.</text>
    <text x="22" y="141" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1.1">PREPARE</text>
    <g fill="#ffffff" stroke="#b9c9dc">
      <rect x="22" y="154" width="316" height="48" rx="8"/><rect x="22" y="214" width="316" height="48" rx="8"/><rect x="22" y="274" width="316" height="48" rx="8"/><rect x="22" y="334" width="316" height="48" rx="8"/>
    </g>
    <g fill="#1b2a4e" font-size="11" font-weight="700">
      <text x="39" y="175">1 · User goal</text><text x="39" y="235">2 · Persona + Scope</text><text x="39" y="295">3 · Skill workflow</text><text x="39" y="355">4 · Current Tool catalog</text>
    </g>
    <g fill="#64748b" font-size="9">
      <text x="39" y="190">intent · constraints · confirmation policy</text><text x="39" y="250">actor · store · role · narrow credential</text><text x="39" y="310">capabilities · artifacts · review points</text><text x="39" y="370">schema · risk · side effect · allowed context</text>
    </g>
    <path d="M180 202v12M180 262v12M180 322v12M180 382v22" stroke="#9bb8e8" stroke-width="1.4"/>

    <rect x="22" y="404" width="316" height="83" rx="10" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="39" y="428" fill="#8a5a00" font-size="9" font-weight="750" letter-spacing="1">5 · REQUEST-BOUND APPROVAL</text>
    <text x="39" y="451" fill="#1b2a4e" font-size="11" font-weight="700">Only when the active policy requires it</text>
    <text x="39" y="469" fill="#64748b" font-size="9">action · payload hash · recipient · amount · replay</text>
    <path d="M180 487v22" stroke="#c49a3a" stroke-width="1.5"/>

    <rect x="22" y="509" width="316" height="118" rx="10" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.4"/>
    <text x="39" y="533" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">6 · CORE COMMAND GATE</text>
    <text x="39" y="556" fill="#1b2a4e" font-size="11" font-weight="700">Business-state authority revalidates:</text>
    <text x="39" y="577" fill="#64748b" font-size="10">identity · scope · capability</text>
    <text x="39" y="595" fill="#64748b" font-size="10">state · quote · policy · freshness</text>
    <text x="39" y="613" fill="#64748b" font-size="10">approval · idempotency · replay rules</text>
    <path d="M180 627v22" stroke="#7ea7ef" stroke-width="1.5"/>

    <rect x="22" y="649" width="316" height="91" rx="10" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="39" y="673" fill="#59697f" font-size="9" font-weight="750" letter-spacing="1">7 · AUDIT + RESULT</text>
    <text x="39" y="696" fill="#1b2a4e" font-size="10" font-weight="700">request → approval → command / order → result</text>
    <text x="39" y="715" fill="#64748b" font-size="9">redact secrets and personal data</text>
    <text x="39" y="729" fill="#64748b" font-size="9">render the backend's latest state</text>
  </g>
</svg>
