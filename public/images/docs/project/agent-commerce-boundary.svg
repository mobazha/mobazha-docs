<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent commerce execution boundary</title>
  <desc id="desc">A user goal passes through persona and scope, a Skill, current Tool discovery, request-bound approval when needed, and a Core command gate before business state changes. Audit links the request, approval, command, and result.</desc>
  <rect width="760" height="520" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="758" height="518" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="30" y="36" fill="#004eeb" font-size="11" font-weight="700" letter-spacing="1.5">BOUNDED AGENT COMMERCE</text>
    <text x="30" y="67" fill="#1b2a4e" font-size="24" font-weight="750">Reasoning proposes; typed authority executes</text>
    <text x="30" y="91" fill="#64748b" font-size="13">A model, prompt, or Skill never becomes a commerce-state authority.</text>

    <text x="30" y="127" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.2">PREPARE</text>
    <g fill="#ffffff" stroke="#b9c9dc">
      <rect x="30" y="140" width="154" height="74" rx="10"/><rect x="202" y="140" width="154" height="74" rx="10"/><rect x="374" y="140" width="154" height="74" rx="10"/><rect x="546" y="140" width="184" height="74" rx="10"/>
    </g>
    <g fill="#1b2a4e" font-size="13" font-weight="700" text-anchor="middle">
      <text x="107" y="166">User goal</text><text x="279" y="166">Persona + Scope</text><text x="451" y="166">Skill</text><text x="638" y="166">Current Tool catalog</text>
    </g>
    <g fill="#64748b" font-size="10" text-anchor="middle">
      <text x="107" y="186">intent + constraints</text><text x="279" y="186">actor · store · role</text><text x="451" y="186">workflow + capabilities</text><text x="638" y="186">schema · risk · side effect</text>
      <text x="107" y="201">human or system task</text><text x="279" y="201">narrow credential</text><text x="451" y="201">artifacts + review points</text><text x="638" y="201">allowed personas + skills</text>
    </g>
    <path d="M184 177h18m-5-5 5 5-5 5M356 177h18m-5-5 5 5-5 5M528 177h18m-5-5 5 5-5 5" fill="none" stroke="#9bb8e8" stroke-width="1.5"/>

    <path d="M638 214v31H380" fill="none" stroke="#7ea7ef" stroke-width="1.6"/>
    <text x="30" y="266" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.2">AUTHORIZE + EXECUTE</text>
    <rect x="30" y="280" width="214" height="100" rx="11" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="50" y="305" fill="#8a5a00" font-size="10" font-weight="750" letter-spacing="1">REQUEST-BOUND APPROVAL</text>
    <text x="50" y="330" fill="#1b2a4e" font-size="13" font-weight="700">When policy requires it</text>
    <text x="50" y="350" fill="#64748b" font-size="10">exact action · payload hash · actor</text>
    <text x="50" y="366" fill="#64748b" font-size="10">recipient · amount · idempotency</text>

    <rect x="272" y="280" width="458" height="100" rx="11" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.4"/>
    <text x="292" y="305" fill="#004eeb" font-size="10" font-weight="750" letter-spacing="1">CORE COMMAND GATE · BUSINESS-STATE AUTHORITY</text>
    <g fill="#ffffff" stroke="#c4d6f5">
      <rect x="292" y="322" width="126" height="37" rx="7"/><rect x="439" y="322" width="126" height="37" rx="7"/><rect x="586" y="322" width="124" height="37" rx="7"/>
    </g>
    <g fill="#1b2a4e" font-size="10" font-weight="700" text-anchor="middle">
      <text x="355" y="345">Identity + capability</text><text x="502" y="345">State + quote + policy</text><text x="648" y="345">Freshness + replay</text>
    </g>
    <path d="M244 330h28m-6-5 6 5-6 5" fill="none" stroke="#c49a3a" stroke-width="1.6"/>

    <rect x="30" y="410" width="700" height="69" rx="10" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="50" y="434" fill="#59697f" font-size="10" font-weight="750" letter-spacing="1.1">AUDIT + RESULT</text>
    <text x="50" y="458" fill="#1b2a4e" font-size="13" font-weight="650">Request ID → approval ID → command / order ID → result · secrets and personal data redacted</text>
    <text x="710" y="434" text-anchor="end" fill="#64748b" font-size="10">success does not replace backend state</text>
  </g>
</svg>
