<svg xmlns="http://www.w3.org/2000/svg" width="360" height="760" viewBox="0 0 360 760" role="img" aria-labelledby="title desc">
  <title id="title">Mobazha transaction spine</title>
  <desc id="desc">A vertical normal path from reviewing terms to completion followed by three separate bands for Core-owned order state, payment-session evidence, and policy-gated recovery.</desc>
  <rect width="360" height="760" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="758" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="22" y="34" fill="#004eeb" font-size="10" font-weight="700" letter-spacing="1.3">TRANSACTION SPINE</text>
    <text x="22" y="62" fill="#1b2a4e" font-size="21" font-weight="750">One trade, three surfaces</text>
    <text x="22" y="85" fill="#64748b" font-size="11">Connected, but never collapsed into one status.</text>
    <text x="22" y="119" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1.1">NORMAL PATH</text>
    <line x1="47" y1="147" x2="47" y2="343" stroke="#9bb8e8" stroke-width="2"/>
    <g fill="#ffffff" stroke="#6f9ff1" stroke-width="1.3">
      <circle cx="47" cy="147" r="17"/><circle cx="47" cy="196" r="17"/><circle cx="47" cy="245" r="17"/><circle cx="47" cy="294" r="17"/><circle cx="47" cy="343" r="17"/>
    </g>
    <g fill="#004eeb" font-size="10" font-weight="750" text-anchor="middle">
      <text x="47" y="151">1</text><text x="47" y="200">2</text><text x="47" y="249">3</text><text x="47" y="298">4</text><text x="47" y="347">5</text>
    </g>
    <g fill="#1b2a4e" font-size="12" font-weight="700">
      <text x="77" y="151">Review terms</text><text x="77" y="200">Create order</text><text x="77" y="249">Fund and verify</text><text x="77" y="298">Accept and fulfill</text><text x="77" y="347">Complete</text>
    </g>
    <rect x="22" y="382" width="316" height="76" rx="10" fill="#eef4ff" stroke="#8aafea"/>
    <text x="39" y="405" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">ORDER · CORE AUTHORITY</text>
    <text x="39" y="428" fill="#1b2a4e" font-size="11" font-weight="650">Accepted snapshot · current state</text>
    <text x="39" y="445" fill="#1b2a4e" font-size="11" font-weight="650">admitted action · business outcome</text>
    <rect x="22" y="470" width="316" height="76" rx="10" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="39" y="493" fill="#59697f" font-size="9" font-weight="750" letter-spacing="1">PAYMENT SESSION · EVIDENCE</text>
    <text x="39" y="516" fill="#1b2a4e" font-size="11" font-weight="650">Order binding · funding target</text>
    <text x="39" y="533" fill="#1b2a4e" font-size="11" font-weight="650">observation · verification · settlement</text>
    <rect x="22" y="558" width="316" height="117" rx="10" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="39" y="581" fill="#8a5a00" font-size="9" font-weight="750" letter-spacing="1">PROTECTION + RECOVERY · POLICY GATED</text>
    <g fill="#ffffff" stroke="#dfc488">
      <rect x="39" y="597" width="132" height="27" rx="7"/><rect x="189" y="597" width="132" height="27" rx="7"/>
      <rect x="39" y="634" width="132" height="27" rx="7"/><rect x="189" y="634" width="132" height="27" rx="7"/>
    </g>
    <g fill="#6d4b0c" font-size="10" font-weight="700" text-anchor="middle">
      <text x="105" y="615">Cancel</text><text x="255" y="615">Decline</text><text x="105" y="652">Refund</text><text x="255" y="652">Dispute</text>
    </g>
    <text x="180" y="707" text-anchor="middle" fill="#475569" font-size="10" font-weight="650">Events prompt a refresh.</text>
    <text x="180" y="724" text-anchor="middle" fill="#475569" font-size="10" font-weight="650">Backend state authorizes the next action.</text>
  </g>
</svg>
