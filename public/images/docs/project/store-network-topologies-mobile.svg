<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1040" viewBox="0 0 360 1040" role="img" aria-labelledby="title desc">
  <title id="title">Mobazha direct peer-to-peer and hybrid store network maps for narrow screens</title>
  <desc id="desc">A direct peer-to-peer map shows a buyer entering one selected independent store Node while two stores remain separate peers. A hybrid map shows a resolver choosing either an independent Node or a hosted service region where a gateway routes context to a Commercial Node.</desc>
  <defs>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#dce6f3"/></pattern>
    <filter id="lift" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="3" flood-color="#315b9f" flood-opacity="0.10" stdDeviation="4"/></filter>
    <marker id="arrow" markerHeight="7" markerWidth="7" orient="auto" refX="6" refY="3.5"><path d="M0 0 7 3.5 0 7z" fill="#4f83df"/></marker>
  </defs>
  <rect width="360" height="1040" rx="16" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="1038" rx="15" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="20" y="31" fill="#004eeb" font-size="10" font-weight="700" letter-spacing="1.2">STORE NETWORK TOPOLOGIES</text>
    <text x="20" y="58" fill="#1b2a4e" font-size="19" font-weight="750">Two shapes. One authority rule.</text>
    <text x="20" y="79" fill="#64748b" font-size="10">Each order stays with its selected seller backend.</text>

    <rect x="16" y="99" width="328" height="392" rx="13" fill="#ffffff" stroke="#dbe5f1"/>
    <path d="M29 136h302v340H29z" fill="url(#dots)" opacity="0.5"/>
    <text x="30" y="124" fill="#315b9f" font-size="9" font-weight="750" letter-spacing="1">1 · DIRECT P2P / INDEPENDENT PEERS</text>
    <rect x="30" y="150" width="300" height="54" rx="27" fill="#f8fafc" stroke="#b9c9dc"/>
    <circle cx="57" cy="177" r="13" fill="#e8eef7"/>
    <text x="57" y="181" text-anchor="middle" fill="#315b9f" font-size="10" font-weight="750">B</text>
    <text x="79" y="172" fill="#1b2a4e" font-size="11" font-weight="700">Buyer entry</text>
    <text x="79" y="188" fill="#64748b" font-size="9">resolves Store A</text>
    <path d="M180 204v24" fill="none" stroke="#4f83df" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="190" y="220" fill="#315b9f" font-size="8" font-weight="700">ORDER REQUEST</text>

    <g filter="url(#lift)"><rect x="30" y="234" width="300" height="112" rx="12" fill="#eef4ff" stroke="#5b8de3" stroke-width="1.7"/></g>
    <rect x="46" y="251" width="31" height="31" rx="8" fill="#0b56d8"/>
    <path d="M54 263h15m-15 6h15" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    <text x="91" y="259" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">SELECTED SELLER</text>
    <text x="91" y="280" fill="#1b2a4e" font-size="13" font-weight="750">Store A · independent Node</text>
    <text x="46" y="305" fill="#475569" font-size="10">Catalog · policy · Order A · payment facts</text>
    <rect x="46" y="317" width="268" height="18" rx="9" fill="#dbe9ff"/>
    <text x="180" y="330" text-anchor="middle" fill="#315b9f" font-size="8" font-weight="750">AUTHORITATIVE FOR ORDER A</text>

    <path d="M180 346v25m0 0H99v14m81-14h81v14" fill="none" stroke="#8da0b8" stroke-width="1.5" stroke-dasharray="5 4"/>
    <rect x="94" y="387" width="112" height="48" rx="9" fill="#f8fafc" stroke="#b9c9dc"/>
    <rect x="216" y="387" width="112" height="48" rx="9" fill="#f8fafc" stroke="#b9c9dc"/>
    <text x="150" y="407" text-anchor="middle" fill="#1b2a4e" font-size="10" font-weight="700">Store B Node</text>
    <text x="150" y="422" text-anchor="middle" fill="#64748b" font-size="8">separate orders</text>
    <text x="272" y="407" text-anchor="middle" fill="#1b2a4e" font-size="10" font-weight="700">Store C Node</text>
    <text x="272" y="422" text-anchor="middle" fill="#64748b" font-size="8">separate operator</text>
    <rect x="83" y="445" width="194" height="20" rx="10" fill="#ffffff" stroke="#dbe5f1"/>
    <text x="180" y="459" text-anchor="middle" fill="#64748b" font-size="8">P2P signals · not private-order replication</text>
    <text x="180" y="480" text-anchor="middle" fill="#64748b" font-size="8">Discovery, signed content, and messages may cross peers.</text>

    <rect x="16" y="509" width="328" height="432" rx="13" fill="#ffffff" stroke="#dbe5f1"/>
    <path d="M29 546h302v380H29z" fill="url(#dots)" opacity="0.38"/>
    <text x="30" y="534" fill="#315b9f" font-size="9" font-weight="750" letter-spacing="1">2 · HYBRID / INDEPENDENT + HOSTED</text>
    <rect x="30" y="559" width="300" height="50" rx="25" fill="#f8fafc" stroke="#b9c9dc"/>
    <circle cx="55" cy="584" r="12" fill="#e8eef7"/>
    <text x="55" y="588" text-anchor="middle" fill="#315b9f" font-size="9" font-weight="750">B</text>
    <text x="77" y="580" fill="#1b2a4e" font-size="10" font-weight="700">Buyer entry · domain · market · direct link</text>
    <text x="77" y="596" fill="#64748b" font-size="8">asks for the selected seller context</text>
    <path d="M180 609v19" fill="none" stroke="#4f83df" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="88" y="633" width="184" height="30" rx="15" fill="#ffffff" stroke="#6f9ff1"/>
    <text x="180" y="652" text-anchor="middle" fill="#315b9f" font-size="9" font-weight="700">Resolve selected store</text>
    <path d="M180 663v22m0 0H101v16m79-16h79v16" fill="none" stroke="#4f83df" stroke-width="1.8"/>
    <path d="m96 696 5 5 5-5m148 0 5 5 5-5" fill="none" stroke="#4f83df" stroke-width="1.8"/>

    <g filter="url(#lift)"><rect x="30" y="703" width="142" height="118" rx="11" fill="#eef4ff" stroke="#5b8de3" stroke-width="1.6"/></g>
    <text x="44" y="725" fill="#004eeb" font-size="8" font-weight="750">INDEPENDENT PATH</text>
    <text x="44" y="747" fill="#1b2a4e" font-size="11" font-weight="750">Self-hosted</text>
    <text x="44" y="763" fill="#1b2a4e" font-size="11" font-weight="750">Store A Node</text>
    <text x="44" y="787" fill="#475569" font-size="8">operator-owned runtime</text>
    <text x="44" y="806" fill="#315b9f" font-size="8" font-weight="700">OWNS ORDER A</text>

    <rect x="188" y="691" width="142" height="142" rx="11" fill="#effaf7" stroke="#74b7a4" stroke-width="1.3"/>
    <text x="202" y="713" fill="#357a68" font-size="8" font-weight="750">HOSTED SERVICE REGION</text>
    <rect x="202" y="724" width="114" height="25" rx="6" fill="#ffffff" stroke="#afd9cd"/>
    <text x="259" y="740" text-anchor="middle" fill="#357a68" font-size="8">Gateway routes context</text>
    <rect x="202" y="757" width="114" height="58" rx="8" fill="#eef4ff" stroke="#5b8de3"/>
    <text x="259" y="777" text-anchor="middle" fill="#004eeb" font-size="8" font-weight="750">COMMERCIAL NODE</text>
    <text x="259" y="794" text-anchor="middle" fill="#1b2a4e" font-size="9" font-weight="700">Store B state</text>
    <text x="259" y="807" text-anchor="middle" fill="#315b9f" font-size="7" font-weight="700">OWNS ORDER B</text>

    <path d="M172 839h16" fill="none" stroke="#8da0b8" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="180" y="855" text-anchor="middle" fill="#64748b" font-size="8">shared public protocols</text>
    <text x="30" y="878" fill="#64748b" font-size="8" font-weight="700" letter-spacing="0.8">OPTIONAL SERVICE SATELLITES</text>
    <rect x="30" y="890" width="142" height="25" rx="12" fill="#fff8ea" stroke="#e8c574"/>
    <rect x="188" y="890" width="142" height="25" rx="12" fill="#fff8ea" stroke="#e8c574"/>
    <text x="101" y="906" text-anchor="middle" fill="#765b21" font-size="8" font-weight="650">Search · communities</text>
    <text x="259" y="906" text-anchor="middle" fill="#765b21" font-size="8" font-weight="650">Payment · delivery · AI</text>
    <text x="180" y="930" text-anchor="middle" fill="#315b9f" font-size="8" font-weight="700">The gateway is not authority for independent orders.</text>

    <line x1="26" y1="972" x2="58" y2="972" stroke="#4f83df" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="68" y="976" fill="#64748b" font-size="8">active request or selected path</text>
    <line x1="26" y1="997" x2="58" y2="997" stroke="#8da0b8" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="68" y="1001" fill="#64748b" font-size="8">peer, protocol, or service relationship</text>
    <text x="180" y="1028" text-anchor="middle" fill="#315b9f" font-size="9" font-weight="700">Selected seller backend = order authority</text>
  </g>
</svg>
