<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" role="img" aria-labelledby="title desc">
  <title id="title">Surfaces and integration contracts</title>
  <desc id="desc">Web, mobile, desktop, community, and Agent shells resolve store and actor context before using HTTP, WebSocket, webhook, MCP, or chat contracts. Effective capability and authorization gate every path before Core-owned commerce state.</desc>
  <rect width="760" height="540" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="758" height="538" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="30" y="36" fill="#004eeb" font-size="11" font-weight="700" letter-spacing="1.5">SURFACES AND INTEGRATIONS</text>
    <text x="30" y="67" fill="#1b2a4e" font-size="24" font-weight="750">Many surfaces, one commerce authority</text>
    <text x="30" y="91" fill="#64748b" font-size="13">Shell, context, transport, capability, and state are different layers.</text>

    <text x="30" y="124" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.2">EXPERIENCE SHELLS</text>
    <g fill="#ffffff" stroke="#b9c9dc">
      <rect x="30" y="136" width="124" height="46" rx="8"/><rect x="174" y="136" width="124" height="46" rx="8"/><rect x="318" y="136" width="124" height="46" rx="8"/><rect x="462" y="136" width="124" height="46" rx="8"/><rect x="606" y="136" width="124" height="46" rx="8"/>
    </g>
    <g fill="#1b2a4e" font-size="11" font-weight="700" text-anchor="middle">
      <text x="92" y="163">Web</text><text x="236" y="163">Mobile / desktop</text><text x="380" y="163">Community</text><text x="524" y="163">Embedded / browser</text><text x="668" y="163">Agent workspace</text>
    </g>
    <path d="M92 182v21M236 182v21M380 182v21M524 182v21M668 182v21" stroke="#9bb8e8" stroke-width="1.4"/>

    <rect x="30" y="203" width="700" height="67" rx="10" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.4"/>
    <text x="50" y="227" fill="#004eeb" font-size="10" font-weight="750" letter-spacing="1.1">SERVER-RESOLVED CONTEXT</text>
    <text x="50" y="251" fill="#1b2a4e" font-size="12" font-weight="650">deployment · tenant · store · storefront / market · identity · role / persona · effective capabilities</text>
    <path d="M380 270v25" stroke="#7ea7ef" stroke-width="1.6"/>

    <text x="30" y="312" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.2">INTERACTION CONTRACTS</text>
    <g fill="#ffffff" stroke="#7ea7ef">
      <rect x="30" y="324" width="124" height="70" rx="9"/><rect x="174" y="324" width="124" height="70" rx="9"/><rect x="318" y="324" width="124" height="70" rx="9"/><rect x="462" y="324" width="124" height="70" rx="9"/><rect x="606" y="324" width="124" height="70" rx="9"/>
    </g>
    <g fill="#1b2a4e" font-size="12" font-weight="700" text-anchor="middle">
      <text x="92" y="349">HTTP</text><text x="236" y="349">WebSocket</text><text x="380" y="349">Webhook</text><text x="524" y="349">MCP</text><text x="668" y="349">Chat</text>
    </g>
    <g fill="#64748b" font-size="9.5" text-anchor="middle">
      <text x="92" y="370">read + command</text><text x="236" y="370">live refresh hint</text><text x="380" y="370">signed delivery</text><text x="524" y="370">Tool discovery</text><text x="668" y="370">conversation</text>
      <text x="92" y="384">authoritative result</text><text x="236" y="384">reconcile after gaps</text><text x="380" y="384">retry + dedupe</text><text x="524" y="384">scoped invocation</text><text x="668" y="384">room + message</text>
    </g>
    <path d="M92 394v24M236 394v24M380 394v24M524 394v24M668 394v24" stroke="#9bb8e8" stroke-width="1.4"/>

    <rect x="30" y="418" width="700" height="72" rx="11" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="50" y="442" fill="#8a5a00" font-size="10" font-weight="750" letter-spacing="1.1">CAPABILITY + AUTHORIZATION → CORE-OWNED COMMERCE STATE</text>
    <text x="50" y="466" fill="#1b2a4e" font-size="12" font-weight="650">quote · order · payment verification · fulfillment · recovery · audit</text>
    <text x="710" y="466" text-anchor="end" fill="#64748b" font-size="10">only admitted transitions persist</text>
    <text x="380" y="519" text-anchor="middle" fill="#315b9f" font-size="11" font-weight="700">A domain routes · an event prompts refresh · a message communicates · Core decides state</text>
  </g>
</svg>
