<svg xmlns="http://www.w3.org/2000/svg" width="760" height="640" viewBox="0 0 760 640" role="img" aria-labelledby="title desc">
  <title id="title">Mobazha direct peer-to-peer and hybrid store network maps</title>
  <desc id="desc">A direct peer-to-peer map shows a buyer entering one selected independent store Node while other stores remain separate peers. A hybrid map shows the same public store network connecting an independent Node and a hosted service region, where the gateway routes hosted context and the Commercial Node owns hosted store state.</desc>
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#dce6f3"/></pattern>
    <filter id="lift" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="3" flood-color="#315b9f" flood-opacity="0.10" stdDeviation="4"/></filter>
    <marker id="arrow" markerHeight="7" markerWidth="7" orient="auto" refX="6" refY="3.5"><path d="M0 0 7 3.5 0 7z" fill="#4f83df"/></marker>
  </defs>
  <rect width="760" height="640" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="758" height="638" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="30" y="35" fill="#004eeb" font-size="11" font-weight="700" letter-spacing="1.5">STORE NETWORK TOPOLOGIES</text>
    <text x="30" y="66" fill="#1b2a4e" font-size="24" font-weight="750">Two network shapes. One order-authority rule.</text>
    <text x="30" y="90" fill="#64748b" font-size="13">Stores may connect through peers and services; each order stays with its selected seller backend.</text>

    <rect x="24" y="112" width="712" height="214" rx="14" fill="#ffffff" stroke="#dbe5f1"/>
    <path d="M39 149h682v162H39z" fill="url(#dots)" opacity="0.58"/>
    <text x="42" y="137" fill="#315b9f" font-size="10" font-weight="750" letter-spacing="1.2">1 · DIRECT P2P / INDEPENDENT STORE PEERS</text>

    <rect x="44" y="181" width="132" height="70" rx="35" fill="#f8fafc" stroke="#b9c9dc"/>
    <circle cx="70" cy="216" r="16" fill="#e8eef7"/>
    <text x="70" y="221" text-anchor="middle" fill="#315b9f" font-size="12" font-weight="750">B</text>
    <text x="94" y="210" fill="#1b2a4e" font-size="12" font-weight="700">Buyer entry</text>
    <text x="94" y="228" fill="#64748b" font-size="9">resolves Store A</text>

    <g filter="url(#lift)">
      <rect x="250" y="158" width="238" height="122" rx="14" fill="#eef4ff" stroke="#5b8de3" stroke-width="1.8"/>
    </g>
    <rect x="268" y="176" width="34" height="34" rx="9" fill="#0b56d8"/>
    <path d="M277 190h16m-16 6h16" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="281" cy="184" r="1.5" fill="#a9c5ff"/><circle cx="281" cy="202" r="1.5" fill="#a9c5ff"/>
    <text x="316" y="184" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">SELECTED SELLER</text>
    <text x="316" y="206" fill="#1b2a4e" font-size="15" font-weight="750">Store A · independent Node</text>
    <text x="268" y="232" fill="#475569" font-size="11">Catalog · policy · Order A · payment facts</text>
    <rect x="268" y="245" width="202" height="22" rx="11" fill="#dbe9ff"/>
    <text x="369" y="260" text-anchor="middle" fill="#315b9f" font-size="9" font-weight="750">AUTHORITATIVE FOR ORDER A</text>

    <rect x="552" y="160" width="154" height="58" rx="11" fill="#f8fafc" stroke="#b9c9dc"/>
    <circle cx="574" cy="189" r="12" fill="#e8eef7"/>
    <text x="574" y="193" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700">N</text>
    <text x="595" y="184" fill="#1b2a4e" font-size="11" font-weight="700">Store B Node</text>
    <text x="595" y="201" fill="#64748b" font-size="9">separate orders</text>
    <rect x="552" y="239" width="154" height="50" rx="11" fill="#f8fafc" stroke="#b9c9dc"/>
    <circle cx="574" cy="264" r="12" fill="#e8eef7"/>
    <text x="574" y="268" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700">N</text>
    <text x="595" y="259" fill="#1b2a4e" font-size="11" font-weight="700">Store C Node</text>
    <text x="595" y="276" fill="#64748b" font-size="9">separate operator</text>

    <path d="M176 216h66" fill="none" stroke="#4f83df" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="209" y="204" text-anchor="middle" fill="#315b9f" font-size="8" font-weight="700">ORDER REQUEST</text>
    <path d="M488 190C520 190 521 189 544 189M488 247c32 0 33 17 56 17" fill="none" stroke="#8da0b8" stroke-width="1.6" stroke-dasharray="5 4"/>
    <rect x="500" y="216" width="122" height="18" rx="9" fill="#ffffff" stroke="#dbe5f1"/>
    <text x="561" y="228" text-anchor="middle" fill="#64748b" font-size="8">P2P network signals</text>
    <text x="376" y="306" text-anchor="middle" fill="#64748b" font-size="10">Peers can exchange permitted discovery, signed content, and messages—not copies of every private order.</text>

    <rect x="24" y="344" width="712" height="236" rx="14" fill="#ffffff" stroke="#dbe5f1"/>
    <path d="M39 381h682v184H39z" fill="url(#dots)" opacity="0.42"/>
    <text x="42" y="369" fill="#315b9f" font-size="10" font-weight="750" letter-spacing="1.2">2 · HYBRID / INDEPENDENT + HOSTED STORES</text>

    <rect x="44" y="386" width="126" height="62" rx="31" fill="#f8fafc" stroke="#b9c9dc"/>
    <circle cx="68" cy="417" r="14" fill="#e8eef7"/>
    <text x="68" y="421" text-anchor="middle" fill="#315b9f" font-size="10" font-weight="750">B</text>
    <text x="90" y="410" fill="#1b2a4e" font-size="11" font-weight="700">Buyer entry</text>
    <text x="90" y="427" fill="#64748b" font-size="8">domain · market</text>

    <rect x="206" y="400" width="158" height="34" rx="17" fill="#ffffff" stroke="#6f9ff1"/>
    <text x="285" y="421" text-anchor="middle" fill="#315b9f" font-size="10" font-weight="700">Resolve selected store</text>

    <g filter="url(#lift)"><rect x="190" y="468" width="194" height="78" rx="13" fill="#eef4ff" stroke="#5b8de3" stroke-width="1.7"/></g>
    <rect x="206" y="484" width="28" height="28" rx="7" fill="#0b56d8"/>
    <path d="M213 495h14m-14 6h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    <text x="246" y="491" fill="#004eeb" font-size="8" font-weight="750">INDEPENDENT PATH</text>
    <text x="246" y="510" fill="#1b2a4e" font-size="12" font-weight="750">Self-hosted Store A</text>
    <text x="206" y="531" fill="#315b9f" font-size="8" font-weight="700">OWNS STORE A ORDERS</text>

    <rect x="432" y="390" width="278" height="164" rx="15" fill="#effaf7" stroke="#74b7a4" stroke-width="1.4"/>
    <text x="450" y="414" fill="#357a68" font-size="9" font-weight="750" letter-spacing="1">HOSTED SERVICE REGION</text>
    <rect x="450" y="427" width="242" height="27" rx="8" fill="#ffffff" stroke="#afd9cd"/>
    <text x="571" y="445" text-anchor="middle" fill="#357a68" font-size="9" font-weight="700">Hosting Gateway · resolves hosted store context</text>
    <rect x="450" y="465" width="160" height="66" rx="10" fill="#eef4ff" stroke="#5b8de3"/>
    <text x="465" y="485" fill="#004eeb" font-size="8" font-weight="750">COMMERCIAL NODE</text>
    <text x="465" y="503" fill="#1b2a4e" font-size="11" font-weight="700">Store B state</text>
    <text x="465" y="519" fill="#315b9f" font-size="8" font-weight="700">OWNS STORE B ORDERS</text>
    <rect x="620" y="465" width="72" height="66" rx="10" fill="#ffffff" stroke="#afd9cd"/>
    <text x="656" y="490" text-anchor="middle" fill="#357a68" font-size="9" font-weight="700">Store C</text>
    <text x="656" y="507" text-anchor="middle" fill="#64748b" font-size="8">separate</text>
    <text x="656" y="519" text-anchor="middle" fill="#64748b" font-size="8">context</text>

    <path d="M170 417h28" fill="none" stroke="#4f83df" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M285 434v26" fill="none" stroke="#4f83df" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M364 417h60" fill="none" stroke="#4f83df" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M384 535h58" fill="none" stroke="#8da0b8" stroke-width="1.6" stroke-dasharray="5 4"/>
    <text x="413" y="550" text-anchor="middle" fill="#64748b" font-size="8">public protocols</text>

    <rect x="42" y="591" width="210" height="25" rx="12" fill="#fff8ea" stroke="#e8c574"/>
    <rect x="264" y="591" width="216" height="25" rx="12" fill="#fff8ea" stroke="#e8c574"/>
    <rect x="492" y="591" width="220" height="25" rx="12" fill="#fff8ea" stroke="#e8c574"/>
    <g fill="#765b21" font-size="9" font-weight="650" text-anchor="middle">
      <text x="147" y="607">Search · index · communities</text>
      <text x="372" y="607">Payment · delivery · messaging</text>
      <text x="602" y="607">AI · support · managed services</text>
    </g>
    <text x="380" y="632" text-anchor="middle" fill="#315b9f" font-size="10" font-weight="700">A channel, peer, or gateway does not silently become another seller's order authority.</text>
  </g>
</svg>
