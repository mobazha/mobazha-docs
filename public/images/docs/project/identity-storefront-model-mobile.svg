<svg xmlns="http://www.w3.org/2000/svg" width="360" height="760" viewBox="0 0 360 760" role="img" aria-labelledby="title desc">
  <title id="title">Identity, store, storefront, and channel model for a narrow screen</title>
  <desc id="desc">An account or credential selects an authorized store context. The store owns commerce state. Several storefront views may share that state while presenting different themes, filters, visibility, and channel routes.</desc>
  <rect width="360" height="760" rx="16" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="758" rx="15" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="22" y="31" fill="#004eeb" font-size="9" font-weight="700" letter-spacing="1.1">IDENTITY AND STORE MODEL</text>
    <text x="22" y="57" fill="#1b2a4e" font-size="19" font-weight="750">Four boundaries, one context</text>
    <text x="22" y="78" fill="#64748b" font-size="10">A surface cannot move transaction authority.</text>

    <rect x="22" y="102" width="316" height="72" rx="10" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="38" y="124" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1">ACCESS ASSOCIATION</text>
    <text x="38" y="146" fill="#1b2a4e" font-size="12" font-weight="700">Account · admin · token · Agent credential</text>
    <text x="38" y="162" fill="#64748b" font-size="10">Selects store context and narrow scope</text>
    <path d="M180 174v22m-5-5 5 5 5-5" fill="none" stroke="#7ea7ef" stroke-width="1.6"/>

    <rect x="22" y="196" width="316" height="300" rx="13" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.5"/>
    <text x="38" y="220" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">STORE / NODE · CORE AUTHORITY</text>
    <g fill="#ffffff" stroke="#c4d6f5">
      <rect x="38" y="238" width="284" height="62" rx="8"/>
      <rect x="38" y="312" width="284" height="62" rx="8"/>
      <rect x="38" y="386" width="284" height="62" rx="8"/>
    </g>
    <g fill="#1b2a4e" font-size="13" font-weight="700">
      <text x="52" y="262">Store identity</text>
      <text x="52" y="336">Catalog and policy</text>
      <text x="52" y="410">Transactions and trust</text>
    </g>
    <g fill="#64748b" font-size="10">
      <text x="52" y="281">peer identity · profile · operator</text>
      <text x="52" y="355">listings · availability · terms</text>
      <text x="52" y="429">orders · payment facts · reputation</text>
    </g>
    <text x="180" y="474" text-anchor="middle" fill="#315b9f" font-size="10" font-weight="650">State · policy · recovery · obligations</text>
    <path d="M180 496v22m-5-5 5 5 5-5" fill="none" stroke="#7ea7ef" stroke-width="1.6"/>

    <text x="22" y="540" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1">STOREFRONT VIEWS · SHARE STORE STATE</text>
    <g fill="#ffffff" stroke="#7ea7ef">
      <rect x="22" y="552" width="316" height="48" rx="8"/>
      <rect x="22" y="612" width="316" height="48" rx="8"/>
      <rect x="22" y="672" width="316" height="48" rx="8"/>
    </g>
    <g fill="#1b2a4e" font-size="12" font-weight="700">
      <text x="36" y="574">Default storefront</text>
      <text x="36" y="634">Community storefront</text>
      <text x="36" y="694">Campaign storefront</text>
    </g>
    <g fill="#64748b" font-size="10" text-anchor="end">
      <text x="324" y="589">Web / domain</text>
      <text x="324" y="649">Embedded / social / link</text>
      <text x="324" y="709">Integration / Agent</text>
    </g>
    <text x="180" y="744" text-anchor="middle" fill="#64748b" font-size="10">Theme and route vary; shared commerce state does not.</text>
  </g>
</svg>
