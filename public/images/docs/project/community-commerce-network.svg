<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Community commerce network</title>
  <desc id="desc">Web, community, direct-link, and Agent channels lead into an operator-owned discovery and curation projection. Participating stores remain separate business-state authorities, and checkout hands off to one selected seller.</desc>
  <rect width="760" height="520" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="758" height="518" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="30" y="36" fill="#004eeb" font-size="11" font-weight="700" letter-spacing="1.5">DISTRIBUTED DISCOVERY</text>
    <text x="30" y="67" fill="#1b2a4e" font-size="24" font-weight="750">One network, many market entrances</text>
    <text x="30" y="91" fill="#64748b" font-size="13">Operators own audience and curation; sellers keep transaction authority.</text>

    <text x="30" y="126" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.2">ENTRY CHANNELS</text>
    <g fill="#ffffff" stroke="#b9c9dc">
      <rect x="30" y="138" width="160" height="50" rx="9"/><rect x="210" y="138" width="160" height="50" rx="9"/><rect x="390" y="138" width="160" height="50" rx="9"/><rect x="570" y="138" width="160" height="50" rx="9"/>
    </g>
    <g fill="#1b2a4e" font-size="12" font-weight="700" text-anchor="middle">
      <text x="110" y="160">Community</text><text x="290" y="160">Web / domain</text><text x="470" y="160">Direct / Deal link</text><text x="650" y="160">Agent / integration</text>
    </g>
    <g fill="#64748b" font-size="10" text-anchor="middle">
      <text x="110" y="177">social or embedded context</text><text x="290" y="177">public or restricted entry</text><text x="470" y="177">known offer handoff</text><text x="650" y="177">machine discovery</text>
    </g>
    <path d="M110 188v20M290 188v20M470 188v20M650 188v20" stroke="#9bb8e8" stroke-width="1.5"/>

    <rect x="30" y="208" width="700" height="112" rx="13" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.4"/>
    <text x="50" y="232" fill="#004eeb" font-size="10" font-weight="750" letter-spacing="1.1">COMMUNITY OR OPERATOR MARKET · DISCOVERY PROJECTION</text>
    <g fill="#ffffff" stroke="#c4d6f5">
      <rect x="50" y="247" width="202" height="52" rx="8"/><rect x="279" y="247" width="202" height="52" rx="8"/><rect x="508" y="247" width="202" height="52" rx="8"/>
    </g>
    <g fill="#1b2a4e" font-size="12" font-weight="700" text-anchor="middle">
      <text x="151" y="268">Market identity</text><text x="380" y="268">Consent + visibility</text><text x="609" y="268">Curation + access</text>
    </g>
    <g fill="#64748b" font-size="10" text-anchor="middle">
      <text x="151" y="286">brand · domain · narrative</text><text x="380" y="286">invite · review · leave</text><text x="609" y="286">catalog · buyer entry · ranking</text>
    </g>

    <path d="M151 320v28M380 320v28M609 320v28" stroke="#7ea7ef" stroke-width="1.6"/>
    <text x="30" y="365" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.2">INDEPENDENT SELLER AUTHORITIES</text>
    <g fill="#ffffff" stroke="#7ea7ef">
      <rect x="30" y="378" width="215" height="66" rx="10"/><rect x="272" y="378" width="215" height="66" rx="10"/><rect x="514" y="378" width="216" height="66" rx="10"/>
    </g>
    <g fill="#1b2a4e" font-size="13" font-weight="700" text-anchor="middle">
      <text x="137" y="403">Seller store A</text><text x="379" y="403">Seller store B</text><text x="622" y="403">Seller store C</text>
    </g>
    <g fill="#64748b" font-size="10" text-anchor="middle">
      <text x="137" y="421">live terms · order · payment</text><text x="379" y="421">live terms · order · payment</text><text x="622" y="421">live terms · order · payment</text>
      <text x="137" y="435">fulfillment · reputation</text><text x="379" y="435">fulfillment · reputation</text><text x="622" y="435">fulfillment · reputation</text>
    </g>
    <rect x="108" y="468" width="544" height="31" rx="8" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="380" y="488" text-anchor="middle" fill="#6d4b0c" font-size="11" font-weight="700">Selected offer → one seller context → one quote, order, and transaction spine</text>
  </g>
</svg>
