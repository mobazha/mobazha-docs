<svg xmlns="http://www.w3.org/2000/svg" width="360" height="560" viewBox="0 0 360 560" role="img" aria-labelledby="title desc">
  <title id="title">Self-hosted Mobazha trust boundary</title>
  <desc id="desc">A vertical responsibility map from people and scoped agents through network and TLS to an operator-controlled Mobazha Node and local data, with payment and hosted services as explicit dependencies.</desc>
  <rect width="360" height="560" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="558" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="22" y="34" fill="#004eeb" font-size="10" font-weight="700" letter-spacing="1.2">SELF-HOSTING BOUNDARY</text>
    <text x="22" y="62" fill="#1b2a4e" font-size="20" font-weight="750">Control the Node</text>
    <text x="22" y="84" fill="#64748b" font-size="11">Keep every external dependency explicit.</text>

    <rect x="22" y="111" width="316" height="294" rx="12" fill="#ffffff" stroke="#6f9ff1" stroke-width="1.4" stroke-dasharray="6 5"/>
    <text x="39" y="134" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">OPERATOR-CONTROLLED</text>

    <rect x="49" y="158" width="262" height="48" rx="9" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="180" y="180" text-anchor="middle" fill="#1b2a4e" font-size="12" font-weight="700">People + scoped Agents</text><text x="180" y="195" text-anchor="middle" fill="#64748b" font-size="9">identity · scope · approval</text>
    <path d="M180 206v24m-5-6 5 6 5-6" fill="none" stroke="#6f9ff1" stroke-width="1.6"/>
    <rect x="49" y="230" width="262" height="48" rx="9" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="180" y="252" text-anchor="middle" fill="#1b2a4e" font-size="12" font-weight="700">Network + TLS</text><text x="180" y="267" text-anchor="middle" fill="#64748b" font-size="9">expose only what is needed</text>
    <path d="M180 278v24m-5-6 5 6 5-6" fill="none" stroke="#6f9ff1" stroke-width="1.6"/>
    <rect x="49" y="302" width="262" height="74" rx="10" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.4"/>
    <text x="180" y="330" text-anchor="middle" fill="#1b2a4e" font-size="14" font-weight="750">Mobazha Node + local data</text><text x="180" y="351" text-anchor="middle" fill="#004eeb" font-size="10" font-weight="700">business-state authority · backup · retention</text>

    <rect x="22" y="430" width="148" height="58" rx="9" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="96" y="454" text-anchor="middle" fill="#6d4b0c" font-size="10" font-weight="700">Payment systems</text><text x="96" y="472" text-anchor="middle" fill="#6d4b0c" font-size="9">verified records</text>
    <rect x="190" y="430" width="148" height="58" rx="9" fill="#ffffff" stroke="#b9c9dc" stroke-dasharray="4 4"/>
    <text x="264" y="454" text-anchor="middle" fill="#475569" font-size="10" font-weight="700">Hosted services</text><text x="264" y="472" text-anchor="middle" fill="#64748b" font-size="9">optional dependency</text>
    <text x="180" y="527" text-anchor="middle" fill="#475569" font-size="10" font-weight="650">Operator: security · secrets · backup · upgrade · recovery</text>
  </g>
</svg>
