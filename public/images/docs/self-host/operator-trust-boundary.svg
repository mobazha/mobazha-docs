<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Self-hosted Mobazha trust boundary</title>
  <desc id="desc">People and scoped agents enter an operator-controlled network boundary containing a Mobazha Node and local data, while payment systems and optional hosted services remain explicit external dependencies.</desc>
  <rect width="760" height="420" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="758" height="418" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="30" y="36" fill="#004eeb" font-size="11" font-weight="700" letter-spacing="1.5">SELF-HOSTING TRUST BOUNDARY</text>
    <text x="30" y="67" fill="#1b2a4e" font-size="24" font-weight="750">Control the Node; name every dependency</text>
    <text x="30" y="91" fill="#64748b" font-size="13">One responsibility map—not a mandatory deployment topology.</text>

    <rect x="205" y="122" width="525" height="198" rx="14" fill="#ffffff" stroke="#6f9ff1" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="225" y="146" fill="#004eeb" font-size="10" font-weight="750" letter-spacing="1.2">OPERATOR-CONTROLLED</text>

    <rect x="30" y="176" width="142" height="72" rx="10" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="101" y="204" text-anchor="middle" fill="#1b2a4e" font-size="13" font-weight="700">People + scoped</text>
    <text x="101" y="223" text-anchor="middle" fill="#1b2a4e" font-size="13" font-weight="700">Agents</text>
    <text x="101" y="267" text-anchor="middle" fill="#64748b" font-size="10">identity · approval</text>

    <rect x="229" y="176" width="135" height="72" rx="10" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="296" y="205" text-anchor="middle" fill="#1b2a4e" font-size="13" font-weight="700">Network + TLS</text>
    <text x="296" y="225" text-anchor="middle" fill="#64748b" font-size="10">minimum exposure</text>

    <rect x="395" y="166" width="143" height="92" rx="11" fill="#eef4ff" stroke="#6f9ff1" stroke-width="1.5"/>
    <text x="466" y="202" text-anchor="middle" fill="#1b2a4e" font-size="15" font-weight="750">Mobazha Node</text>
    <text x="466" y="224" text-anchor="middle" fill="#004eeb" font-size="11" font-weight="700">business-state authority</text>

    <rect x="570" y="176" width="136" height="72" rx="10" fill="#ffffff" stroke="#b9c9dc"/>
    <text x="638" y="205" text-anchor="middle" fill="#1b2a4e" font-size="13" font-weight="700">Local data</text>
    <text x="638" y="225" text-anchor="middle" fill="#64748b" font-size="10">backup · retention</text>

    <g stroke="#6f9ff1" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M172 212h57m-7-5 7 5-7 5M364 212h31m-7-5 7 5-7 5M538 212h32m-7-5 7 5-7 5"/>
    </g>

    <rect x="229" y="273" width="206" height="35" rx="8" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="332" y="295" text-anchor="middle" fill="#6d4b0c" font-size="11" font-weight="700">Payment systems · verified records</text>
    <rect x="455" y="273" width="251" height="35" rx="8" fill="#ffffff" stroke="#b9c9dc" stroke-dasharray="4 4"/>
    <text x="580" y="295" text-anchor="middle" fill="#475569" font-size="11" font-weight="700">Optional hosted services · explicit dependency</text>

    <text x="30" y="359" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.1">OPERATOR RESPONSIBILITY</text>
    <text x="30" y="384" fill="#1b2a4e" font-size="12" font-weight="650">Host security · secrets · observability · backup · upgrade · recovery · external-service selection</text>
  </g>
</svg>
