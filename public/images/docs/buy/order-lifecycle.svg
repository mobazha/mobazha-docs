<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Buyer order lifecycle</title>
  <desc id="desc">A buyer reviews a seller quote, creates an order, follows backend-owned payment and fulfillment milestones, and uses only recovery actions allowed by the current state and policy.</desc>
  <rect width="760" height="420" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="758" height="418" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="30" y="36" fill="#004eeb" font-size="11" font-weight="700" letter-spacing="1.5">BUYER ORDER PATH</text>
    <text x="30" y="67" fill="#1b2a4e" font-size="24" font-weight="750">One quote becomes one seller-owned order</text>
    <text x="30" y="91" fill="#64748b" font-size="13">The order backend—not a receipt image, chat message, or client cache—authorizes the next action.</text>

    <line x1="102" y1="151" x2="658" y2="151" stroke="#9bb8e8" stroke-width="2"/>
    <g fill="#ffffff" stroke="#6f9ff1" stroke-width="1.5">
      <circle cx="102" cy="151" r="24"/><circle cx="380" cy="151" r="24"/><circle cx="658" cy="151" r="24"/>
    </g>
    <g fill="#004eeb" font-size="12" font-weight="750" text-anchor="middle">
      <text x="102" y="155">1</text><text x="380" y="155">2</text><text x="658" y="155">3</text>
    </g>
    <g fill="#1b2a4e" font-size="14" font-weight="700" text-anchor="middle">
      <text x="102" y="194">Review quote</text><text x="380" y="194">Create + save order</text><text x="658" y="194">Verify current state</text>
    </g>
    <g fill="#64748b" font-size="11" text-anchor="middle">
      <text x="102" y="213">seller · item · delivery · total</text>
      <text x="380" y="213">order ID · token · tracking link</text>
      <text x="658" y="213">order state · payment evidence</text>
    </g>

    <text x="30" y="256" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.2">OBSERVABLE MILESTONES</text>
    <line x1="82" y1="292" x2="678" y2="292" stroke="#9bb8e8" stroke-width="2"/>
    <g fill="#ffffff" stroke="#004eeb" stroke-width="1.7">
      <circle cx="82" cy="292" r="8"/><circle cx="281" cy="292" r="8"/><circle cx="479" cy="292" r="8"/><circle cx="678" cy="292" r="8"/>
    </g>
    <g fill="#1b2a4e" font-size="11" font-weight="650" text-anchor="middle">
      <text x="82" y="319">Awaiting payment</text><text x="281" y="319">Funded</text><text x="479" y="319">Fulfilled</text><text x="678" y="319">Completed</text>
    </g>

    <rect x="30" y="346" width="700" height="44" rx="9" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="50" y="364" fill="#8a5a00" font-size="9" font-weight="750" letter-spacing="1">POLICY-GATED RECOVERY</text>
    <text x="50" y="381" fill="#6d4b0c" font-size="11" font-weight="650">Cancel · refund · dispute appear only when the active order state, payment path, and published policy permit them.</text>
  </g>
</svg>
