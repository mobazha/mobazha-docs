<svg xmlns="http://www.w3.org/2000/svg" width="360" height="560" viewBox="0 0 360 560" role="img" aria-labelledby="title desc">
  <title id="title">Buyer order lifecycle</title>
  <desc id="desc">A vertical buyer path from quote review through order creation and state verification, followed by payment and fulfillment milestones and policy-gated recovery.</desc>
  <rect width="360" height="560" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="558" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="22" y="34" fill="#004eeb" font-size="10" font-weight="700" letter-spacing="1.3">BUYER ORDER PATH</text>
    <text x="22" y="62" fill="#1b2a4e" font-size="20" font-weight="750">One seller-owned order</text>
    <text x="22" y="84" fill="#64748b" font-size="11">Backend state authorizes the next action.</text>

    <line x1="47" y1="122" x2="47" y2="242" stroke="#9bb8e8" stroke-width="2"/>
    <g fill="#ffffff" stroke="#6f9ff1" stroke-width="1.4">
      <circle cx="47" cy="122" r="18"/><circle cx="47" cy="182" r="18"/><circle cx="47" cy="242" r="18"/>
    </g>
    <g fill="#004eeb" font-size="10" font-weight="750" text-anchor="middle">
      <text x="47" y="126">1</text><text x="47" y="186">2</text><text x="47" y="246">3</text>
    </g>
    <g fill="#1b2a4e" font-size="12" font-weight="700">
      <text x="78" y="118">Review quote</text><text x="78" y="178">Create + save order</text><text x="78" y="238">Verify current state</text>
    </g>
    <g fill="#64748b" font-size="10">
      <text x="78" y="134">seller · delivery · total</text><text x="78" y="194">ID · token · tracking link</text><text x="78" y="254">order + payment evidence</text>
    </g>

    <text x="22" y="301" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1.1">OBSERVABLE MILESTONES</text>
    <line x1="48" y1="332" x2="312" y2="332" stroke="#9bb8e8" stroke-width="2"/>
    <g fill="#ffffff" stroke="#004eeb" stroke-width="1.5"><circle cx="48" cy="332" r="7"/><circle cx="136" cy="332" r="7"/><circle cx="224" cy="332" r="7"/><circle cx="312" cy="332" r="7"/></g>
    <g fill="#1b2a4e" font-size="9" font-weight="650" text-anchor="middle"><text x="48" y="355">Awaiting</text><text x="136" y="355">Funded</text><text x="224" y="355">Fulfilled</text><text x="312" y="355">Complete</text></g>

    <rect x="22" y="392" width="316" height="105" rx="10" fill="#fff9ed" stroke="#e6bd69"/>
    <text x="39" y="416" fill="#8a5a00" font-size="9" font-weight="750" letter-spacing="1">POLICY-GATED RECOVERY</text>
    <text x="39" y="443" fill="#6d4b0c" font-size="11" font-weight="650">Cancel · refund · dispute</text>
    <text x="39" y="465" fill="#6d4b0c" font-size="10">Only when order state, payment path,</text>
    <text x="39" y="481" fill="#6d4b0c" font-size="10">and published policy allow the action.</text>
    <text x="180" y="530" text-anchor="middle" fill="#475569" font-size="10" font-weight="650">Do not infer settlement from a screenshot or message.</text>
  </g>
</svg>
