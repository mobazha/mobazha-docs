<svg xmlns="http://www.w3.org/2000/svg" width="360" height="560" viewBox="0 0 360 560" role="img" aria-labelledby="title desc">
  <title id="title">Mobazha store readiness loop</title>
  <desc id="desc">Six readiness checkpoints form a loop around store and Node authority: identity and policy, listing and supply, shipping and payment, test purchase, fulfillment and support, and review.</desc>
  <rect width="360" height="560" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="358" height="558" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="22" y="34" fill="#004eeb" font-size="10" font-weight="700" letter-spacing="1.3">STORE READINESS LOOP</text>
    <text x="22" y="62" fill="#1b2a4e" font-size="20" font-weight="750">Test the buyer path</text>
    <text x="22" y="84" fill="#64748b" font-size="11">A published listing is only one checkpoint.</text>

    <line x1="49" y1="126" x2="49" y2="395" stroke="#9bb8e8" stroke-width="2" stroke-dasharray="4 4"/>
    <g fill="#ffffff" stroke="#6f9ff1" stroke-width="1.4">
      <circle cx="49" cy="126" r="18"/><circle cx="49" cy="180" r="18"/><circle cx="49" cy="234" r="18"/><circle cx="49" cy="288" r="18"/><circle cx="49" cy="342" r="18"/><circle cx="49" cy="396" r="18"/>
    </g>
    <g fill="#004eeb" font-size="10" font-weight="750" text-anchor="middle"><text x="49" y="130">1</text><text x="49" y="184">2</text><text x="49" y="238">3</text><text x="49" y="292">4</text><text x="49" y="346">5</text><text x="49" y="400">6</text></g>
    <g fill="#1b2a4e" font-size="12" font-weight="700"><text x="80" y="130">Identity + policy</text><text x="80" y="184">Listing + supply</text><text x="80" y="238">Shipping + payment</text><text x="80" y="292">Test purchase</text><text x="80" y="346">Fulfill + support</text><text x="80" y="400">Review + improve</text></g>

    <rect x="80" y="434" width="258" height="70" rx="10" fill="#eef4ff" stroke="#8aafea"/>
    <text x="97" y="457" fill="#004eeb" font-size="9" font-weight="750" letter-spacing="1">STORE / NODE AUTHORITY</text>
    <text x="97" y="480" fill="#1b2a4e" font-size="12" font-weight="700">Orders · capability · policy · evidence</text>
    <text x="180" y="536" text-anchor="middle" fill="#475569" font-size="10" font-weight="650">Repeat after material operating changes.</text>
  </g>
</svg>
