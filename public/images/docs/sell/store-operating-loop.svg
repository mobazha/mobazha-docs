<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Mobazha store readiness loop</title>
  <desc id="desc">A seller connects store identity and policy, listings, payment readiness, a test purchase, and order operations around a store and Node authority boundary.</desc>
  <rect width="760" height="420" rx="18" fill="#fbfdff"/>
  <rect x="1" y="1" width="758" height="418" rx="17" fill="none" stroke="#dbe5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="30" y="36" fill="#004eeb" font-size="11" font-weight="700" letter-spacing="1.5">STORE READINESS LOOP</text>
    <text x="30" y="67" fill="#1b2a4e" font-size="24" font-weight="750">Test the path buyers will actually use</text>
    <text x="30" y="91" fill="#64748b" font-size="13">Publishing a listing is one checkpoint; payment, delivery, recovery, and support complete the loop.</text>

    <path d="M154 179C211 119 549 119 606 179M606 262C549 324 211 324 154 262" fill="none" stroke="#9bb8e8" stroke-width="2" stroke-dasharray="5 5"/>
    <g fill="#ffffff" stroke="#6f9ff1" stroke-width="1.5">
      <circle cx="154" cy="179" r="31"/><circle cx="295" cy="143" r="31"/><circle cx="465" cy="143" r="31"/><circle cx="606" cy="179" r="31"/>
      <circle cx="521" cy="297" r="31"/><circle cx="239" cy="297" r="31"/>
    </g>
    <g fill="#004eeb" font-size="11" font-weight="750" text-anchor="middle">
      <text x="154" y="183">1</text><text x="295" y="147">2</text><text x="465" y="147">3</text><text x="606" y="183">4</text><text x="521" y="301">5</text><text x="239" y="301">6</text>
    </g>
    <g fill="#1b2a4e" font-size="11" font-weight="700" text-anchor="middle">
      <text x="154" y="224">Identity + policy</text><text x="295" y="104">Listing + supply</text><text x="465" y="104">Shipping + payment</text><text x="606" y="224">Test purchase</text><text x="521" y="343">Fulfill + support</text><text x="239" y="343">Review + improve</text>
    </g>

    <rect x="276" y="188" width="208" height="82" rx="12" fill="#eef4ff" stroke="#8aafea"/>
    <text x="380" y="216" text-anchor="middle" fill="#004eeb" font-size="10" font-weight="750" letter-spacing="1">STORE / NODE AUTHORITY</text>
    <text x="380" y="239" text-anchor="middle" fill="#1b2a4e" font-size="14" font-weight="700">Orders · capability · policy</text>
    <text x="380" y="258" text-anchor="middle" fill="#64748b" font-size="11">Monitor · reconcile · retain evidence</text>

    <line x1="30" y1="374" x2="730" y2="374" stroke="#dbe5f1"/>
    <text x="380" y="398" text-anchor="middle" fill="#475569" font-size="11" font-weight="650">Repeat when policy, inventory, delivery, payment readiness, or software changes.</text>
  </g>
</svg>
